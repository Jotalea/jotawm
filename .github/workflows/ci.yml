name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libx11-dev

      - name: Build
        run: make

      - name: Verify binaries exist
        run: test -x jwm && test -x jwm-session
